  "渝北城更公司",
  "空港城发集团",
  "空港新城公司",
  "战新产业集团",
  "蔡家组团公司"
];

const TYPE_ORDER=[
  "城市建设开发类",
  "资本投资金融类",
  "城市运营服务类",
  "园区产业服务类",
  "科技数字类",
  "资产运营管理类",
  "文商旅会展类",
  "开放物流贸易类",
  "人才服务类",
  "农业水务服务类",
  "其他/拟整合处置类"
];

DATA.forEach(item=>{
  item.g=GROUP_REMAP[item.g] || item.g;
  item.type=TYPE_OVERRIDE[item.n] || TYPE_MAP[item.c] || "其他/拟整合处置类";
});

const state={mode:"all",value:"",keyword:""};

const groupSel=document.getElementById("groupSel");
const typeSel=document.getElementById("typeSel");
const kwInput=document.getElementById("kwInput");
const detailEl=document.getElementById("detail");
const chartEl=document.getElementById("chart");
const statsEl=document.getElementById("stats");
const groupOrderMap=Object.fromEntries(GROUP_ORDER.map((name,index)=>[name,index]));
const typeOrderMap=Object.fromEntries(TYPE_ORDER.map((name,index)=>[name,index]));
const groups=[...new Set(DATA.map(d=>d.g))].sort((a,b)=>(groupOrderMap[a] ?? 999)-(groupOrderMap[b] ?? 999) || a.localeCompare(b,"zh-CN"));
const types=[...new Set(DATA.map(d=>d.type))].sort((a,b)=>(typeOrderMap[a] ?? 999)-(typeOrderMap[b] ?? 999) || a.localeCompare(b,"zh-CN"));

groups.forEach(v=>appendOption(groupSel,v));
types.forEach(v=>appendOption(typeSel,v));

function appendOption(select, value){
  const option=document.createElement("option");
  option.value=value;
  option.textContent=value;
  select.appendChild(option);
}

function countBy(list, key){
  const map={};
  list.forEach(item=>{
    const value=item[key];
    map[value]=(map[value]||0)+1;
  });
  return map;
}

function topLabels(list, key, limit){
  return Object.entries(countBy(list,key))
    .sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0],"zh-CN"))
    .slice(0,limit)
    .map(([name,count])=>`${name} ${count}户`)
    .join("，");
}

function getFilteredData(){
  const kw=state.keyword.trim().toLowerCase();
  return DATA.filter(item=>{
    if(state.mode==="group" && item.g!==state.value) return false;
    if(state.mode==="type" && item.type!==state.value) return false;
    if(kw && !item.n.toLowerCase().includes(kw)) return false;
    return true;
  });
}

function setMode(mode, value){
  state.mode=mode;
  state.value=value||"";
  syncControls();
  render();
}

function syncControls(){
  const allActive=state.mode==="all";
  document.getElementById("btnAll").style.background=allActive?"var(--color-text-primary)":"transparent";
  document.getElementById("btnAll").style.color=allActive?"var(--color-background-primary)":"var(--color-text-primary)";
  groupSel.value=state.mode==="group"?state.value:"";
  typeSel.value=state.mode==="type"?state.value:"";
  kwInput.value=state.keyword;
}

function buildSankeyData(list){
  const nodes=[];
  const nodeMap=new Map();
  const linksMap=new Map();

  function addNode(id, name, kind, color){
    if(!nodeMap.has(id)){
      const node={id,name,kind,color};
      nodeMap.set(id,node);
      nodes.push(node);
    }
  }

  list.forEach(item=>{
    const gid=`g:${item.g}`;
    const tid=`t:${item.type}`;
    addNode(gid,item.g,"group",GROUP_COLORS[item.g]||"#6E7683");
    addNode(tid,item.type,"type",TYPE_COLORS[item.type]||"#8D8A86");

    const key=`${gid}->${tid}`;
    if(!linksMap.has(key)){
      linksMap.set(key,{source:gid,target:tid,value:0,items:[],color:TYPE_COLORS[item.type]||"#8D8A86"});
    }
    const link=linksMap.get(key);
    link.value+=1;
    link.items.push(item);
  });

  return {nodes,links:[...linksMap.values()]};
}

function renderLegend(){
  document.getElementById("legend").innerHTML=types.map(type=>`
    <span style="display:inline-flex;align-items:center;gap:6px;">
      <span style="width:10px;height:10px;border-radius:3px;background:${TYPE_COLORS[type]||"#8D8A86"};"></span>${type}
    </span>
  `).join("");
}

function renderEmpty(){
  chartEl.innerHTML="<div style='padding:48px 16px;text-align:center;color:var(--color-text-tertiary);font-size:14px;'>没有匹配到企业，请调整筛选条件。</div>";
  detailEl.innerHTML="<span style='color:var(--color-text-tertiary);'>当前筛选条件下没有可展示明细。</span>";
}

function renderDefaultDetail(list){
  const topGroup=topLabels(list,"g",3) || "无";
  const topType=topLabels(list,"type",4) || "无";
  detailEl.innerHTML=`
    <div style="font-size:15px;font-weight:600;color:var(--color-text-primary);margin-bottom:8px;">当前视图说明</div>
    <div style="font-size:13px;color:var(--color-text-secondary);line-height:1.8;">
      当前展示 <strong>${list.length}</strong> 户企业，从左到右依次为 <strong>集团</strong>、<strong>主责主业并类</strong>。<br>
      当前集团分布：${topGroup}。<br>
      当前业务类型分布：${topType}。<br>
      可点击节点快速筛选，悬停流线查看企业清单。
    </div>
  `;
}

function renderDetail(title, items, accent){
  const sorted=items.slice().sort((a,b)=>a.n.localeCompare(b.n,"zh-CN"));
  detailEl.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
      <span style="width:10px;height:10px;border-radius:3px;background:${accent};"></span>
      <div style="font-size:15px;font-weight:600;color:var(--color-text-primary);">${title}（${items.length}户）</div>
    </div>
    <div style="display:grid;gap:6px;">
      ${sorted.map(item=>{
        const meta=[
          item.type?`并类：${item.type}`:"",
          item.c?`细分：${item.c}`:"",
          item.core?`核定主责主业：${item.core}`:"",
          item.equity?`股权层级：${item.equity}`:"",
          item.manage?`管理层级：${item.manage}`:"",
          item.rating?`评级：${item.rating}`:""
        ].filter(Boolean).join("｜");
        return `
          <div style="padding:8px 10px;border-radius:10px;background:var(--color-background-primary);border:1px solid var(--color-border-tertiary);">
            <div style="font-size:13px;color:var(--color-text-primary);font-weight:500;">${item.n}</div>
            <div style="font-size:12px;color:var(--color-text-secondary);margin-top:4px;line-height:1.7;">${meta}</div>
          </div>
        `;
      }).join("")}
    </div>
  `;
}

function render(){
  const filtered=getFilteredData();
  statsEl.innerHTML=`显示 <strong>${filtered.length}</strong> / ${DATA.length} 户企业<br>业务类型 <strong>${new Set(filtered.map(d=>d.type)).size}</strong> 类`;

  if(!filtered.length){
    renderEmpty();
    return;
  }

  renderDefaultDetail(filtered);
  const graph=buildSankeyData(filtered);
  const width=980;
  const height=Math.max(420, Math.min(760, graph.nodes.length*20));
  chartEl.innerHTML="";

  const svg=d3.select(chartEl)
    .append("svg")
    .attr("viewBox",`0 0 ${width} ${height}`)
    .attr("width","100%")
    .style("font-family","var(--font-sans)")
    .style("display","block");

  const sankey=d3.sankey()
    .nodeId(d=>d.id)
    .nodeWidth(14)
    .nodePadding(12)
    .nodeSort((a,b)=>{
      if(a.kind!==b.kind) return a.kind.localeCompare(b.kind);
      if(a.kind==="group") return (groupOrderMap[a.name] ?? 999)-(groupOrderMap[b.name] ?? 999);
      if(a.kind==="type") return (typeOrderMap[a.name] ?? 999)-(typeOrderMap[b.name] ?? 999);
      return a.name.localeCompare(b.name,"zh-CN");
    })
    .extent([[160,16],[width-160,height-16]]);

  const {nodes,links}=sankey({
    nodes:graph.nodes.map(d=>({...d})),
    links:graph.links.map(d=>({...d}))
  });

  svg.append("g")
    .selectAll("path")
    .data(links)
    .join("path")
    .attr("d",d3.sankeyLinkHorizontal())
    .attr("fill","none")
    .attr("stroke",d=>d.color)
    .attr("stroke-width",d=>Math.max(1.5,d.width))
    .attr("stroke-opacity",0.34)
    .style("cursor","pointer")
    .on("mouseover",function(_,d){
      d3.select(this).attr("stroke-opacity",0.8);
      const source=d.source.name||d.source.id;
      const target=d.target.name||d.target.id;
      renderDetail(`${source} → ${target}`, d.items, d.color);
    })
    .on("mouseout",function(){
      d3.select(this).attr("stroke-opacity",0.34);
    });

  svg.append("g")
    .selectAll("rect")
    .data(nodes)
    .join("rect")
    .attr("x",d=>d.x0)
    .attr("y",d=>d.y0)
    .attr("width",d=>Math.max(1,d.x1-d.x0))
    .attr("height",d=>Math.max(1,d.y1-d.y0))
    .attr("rx",3)
    .attr("fill",d=>d.color)
    .style("cursor","pointer")
    .on("click",(_,d)=>{
      if(d.kind==="group") setMode("group",d.name);
      else setMode("type",d.name);
    })
    .on("mouseover",(_,d)=>{
      const items=filtered.filter(item=>
        (d.kind==="group" && item.g===d.name) ||
        (d.kind==="type" && item.type===d.name)
      );
      renderDetail(`${d.name}`, items, d.color);
    });

  svg.append("g")
    .selectAll("text")
    .data(nodes)
    .join("text")
    .attr("x",d=>d.kind==="group"?d.x0-8:d.x1+8)
    .attr("y",d=>(d.y0+d.y1)/2)
    .attr("dy","0.35em")
    .attr("text-anchor",d=>d.kind==="group"?"end":"start")
    .attr("font-size","11px")
    .attr("fill","var(--color-text-primary)")
    .style("pointer-events","none")
    .text(d=>`${d.name}（${d.value}）`);
}

document.getElementById("btnAll").onclick=()=>setMode("all");
groupSel.onchange=()=>setMode(groupSel.value?"group":"all",groupSel.value);
typeSel.onchange=()=>setMode(typeSel.value?"type":"all",typeSel.value);
kwInput.oninput=()=>{
  state.keyword=kwInput.value;
  render();
};

renderLegend();
syncControls();
render();
</script>
